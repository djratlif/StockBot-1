version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: stockbot
      POSTGRES_PASSWORD: stockbotpassword
      POSTGRES_DB: stockbot_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://stockbot:stockbotpassword@db:5432/stockbot_db
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=development
      - DEBUG=true
      - PYTHONUNBUFFERED=1
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    depends_on:
      - db
      - redis

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.celery_app worker --loglevel=info
    restart: always
    environment:
      - DATABASE_URL=postgresql://stockbot:stockbotpassword@db:5432/stockbot_db
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=development
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    depends_on:
      - db
      - redis
      - backend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3000:80"
    environment:
      - REACT_APP_API_BASE_URL=http://localhost:8000
    depends_on:
      - backend

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: always
    command: tunnel run stockbot
    volumes:
      - ~/.cloudflared:/home/nonroot/.cloudflared
      - ~/.cloudflared:/Users/drewratliff/.cloudflared
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
